<!DOCTYPE html>
<html>
  <head>
    <title>
      login
    </title>
    <style>
      table{
        border: 2px solid #000;
        border-radius:10px;
        background-color:rgb(209, 200, 200);
      }
      body{
        text-justify: center;
        background-color: rgb(105,104,102);
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 50vh;  
    margin: 0;  
}
    </style>
  </head>
  <body>
    <form>
      <table>
        <tr>
          <th colspan="2"><u>Login form</u></th>
        </tr>
        <tr>
          <td>Enter your email</td>
          </tr>
          <tr>
          <td>
          <input type="email" name="email id" required placeholder="example@gmail.com">
          </td>
        </tr>
        <tr>
         <td>Enter password</td> 
        </tr>
        <tr>
         <td>
          <input type="password" name="password" required placeholder="********">
          </td> 
        </tr>
        <tr>
          <th colspan="2">
            <input type="submit" value="login" name="submit">
            </th>
            </tr>
      </table>
    </form>
  </body>
</html>
