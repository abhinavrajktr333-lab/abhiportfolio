<!DOCTYPE html>
<html>
  <head>
    <title>
      form
    </title>
    <link rel="stylesheet" href="#">
    <style>
      table{
        border: 2px solid #000;
        border-radius:10px;
        background-color:rgb(235, 205, 167);
      }
      body{
        text-justify: center;
        background-color: rgb(105,104,102);
        background-image: url('1.gif');
        background-size: cover;
        background-repeat: no-repeat;
        background-position: center;
        display: flex;
        justify-content: center;
        align-items: center;
        min-height: 50vh;  
        margin: 0;  
        text-align: center;
        color: rgb(77, 24, 77);
}
      table span{
        font-size: 10px;
      }
      table th{
        font-family: Arial;
      }
      table td{
        font-family: Arial;
      }
      table div{
        border: 1px solid ;
      }
      
      input-group{
        background-color: aqua;
        border-radius: 12px;
        border: 8px;
        display: flex;
        flex-direction: column;
      }
      .table{
        background-image: url('photos/2.jpeg');
        background-repeat: no-repeat;
        background-size: cover;
      }
    </style>
  </head>
  <body>
    <form>
      <div>
      <table class="table">
        <tr>
          <th colspan="2", text-align="center"><u>College Form</u><br> <span><i>create your account or </i>
          <div>
          <a href="Login.html">login</a>
          </div>
          </span>
          </th>
        </tr>
        <tr>
          <td colspan="2">Name:</td>
        </tr>
        <tr>
          <td><input type="text" name="fullname" required placeholder="Enter your name"></td>
        </tr>
        <tr>
          <td>Semester:</td>
          </tr>
          <tr>
          <td>
            <select>
              <option>select sem.</option>
              <option>I sem</option>
              <option>II sem</option>
              <option>III sem</option>
              <option>IV sem</option>
              <option>V sem</option>
              <option>VI sem</option>
            </select>
          </td>
        </tr>
        <tr>
          <td>Branch:</td>
        </tr>
        <tr>
          <td>
            <select>
              <option>select Branch</option>
              <option>computer science & engineering</option>
              <option>civil engineering</option>
              <option>electrical engineering</option>
              <option>mechanical engineering</option>
              <option>electronics engineering</option>
            </select>
          </td>
        </tr>
        <tr>
          <td>Session:</td>
        </tr>
        <tr>
          <td>
          <input type="number" name="Session" required placeholder="xxxx-xx">
          </td>
        </tr>
        <tr>
          <td>Roll no.:</td>
        </tr>
        <tr>
          <td>
          <input type="number" name="Roll no." required placeholder="Enter Roll no.">
          </td>
        </tr>
        <tr>
          <td>Registration no.:</td>
        </tr>
        <tr>
          <td>
          <input type="number" name="Registration no." required placeholder="xxxxxxxxxx">
          </td>
        </tr>
                <tr>
          <td>Gender:</td>
        </tr>
        <tr>
          <td>
            <input type="radio" name="Gender">Male
            <input type="radio" name="Gender">Female
            <input type="radio" name="Gender">Other
          </td>
        </tr>
        <tr>
          <td>Email id:</td>
        </tr>
        <tr>
          <td>
          <input type="email" name="email id" required placeholder="example@gmail.com">
          </td>
        </tr>
        <tr>
          <td>Mobile no.:</td>
        </tr>
        <tr>
          <td>
          <input type="number" name="Mobile no." required placeholder="Mobile no.">
          </td>
        </tr>
        <tr>
          <td>Programs:</td>
          </tr>
          <tr>
          <td>
            <select>
              <option>select program</option>
              <option>Dancing🕺💃</option>
              <option>Singing🎤🎶</option>
              <option>Writing✍️📝🖊</option>
              <option>Painting️🖌️🎨</option>
              <option>Quiz⁉️❓</option>
              <option>Poetry️✏️📝</option>
              <option>Scatching️✏️📝</option>
            </select>
          </td>
        </tr>
        <div>
        <tr>
          <th colspan="2">
            <input type="submit" value="submit" name="submit"></th>
        </tr>
        </div>
      </table>
      </div>
    </form>
  </body>
</html>
